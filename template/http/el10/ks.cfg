lang en_US.UTF-8
cdrom
keyboard --xlayouts='us'
rootpw --iscrypted $6$Ch79jCFtuhCEfZlT$gtqTREtMggUycA7GXsKO45zzXrXw/4EA0sEECj1ZuqyW/32v97Xj4TOzvbMrbvXaNT1UllcHnRRjMUikoOzuC.
sshkey --username=root "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINM6WTwse7cb94Yk9jX0uqBECHkk6guklFWDINN0HNFz"
sshkey --username=root "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICjKitHCy64myeWtL0LIuhrKbfPENrVid03MhQB1O2Jj"

# Unprivileged build user that Packer connects as. Passwordless sudo is granted
# in %post so the shell provisioners can run as root.
user --name=ansible --groups=wheel --plaintext --password=ansible

network --hostname=xtallinux --bootproto=dhcp --noipv6 --onboot=on --device=eth0
firewall --disabled
selinux --permissive
timezone America/New_York
bootloader --timeout=1 --location=mbr --append="net.ifnames=0 biosdevname=0"
text
skipx
zerombr
clearpart --all --initlabel
autopart
firstboot --disabled
reboot --eject

%packages --ignoremissing --excludedocs --inst-langs=en_US.utf8
@^minimal-environment
aide
bash-completion
tmux
vim-enhanced
zsh
perl
bind-utils
openssh-server
openssh-clients
sudo
wget
curl
nfs-utils
net-tools
tar
unzip
bzip2
rsync
-fprintd-pam
%end

%post --log=/root/ks-post.log

# Grant the build user passwordless sudo so Packer's shell provisioners
# (which run via `sudo sh -euxc ...`) can configure the system as root.
cat > /etc/sudoers.d/ansible <<'EOF'
ansible ALL=(ALL) NOPASSWD: ALL
EOF
chmod 0440 /etc/sudoers.d/ansible

#
#  vconsole.conf
#
#  Custom keymap: swap Caps Lock/Escape and map Shift+Caps to Control-b.
#

KEYMAP_DIR=/usr/lib/kbd/keymaps/custom
mkdir -p $KEYMAP_DIR
cat > $KEYMAP_DIR/xtal.map <<'EOF'
shift keycode 57 = Control_b
keycode 1 = Caps_Lock
keycode 58 = Escape
EOF

cat > /etc/vconsole.conf <<'EOF'
KEYMAP="xtal"
FONT="Lat2-Terminus16"
EOF
%end
